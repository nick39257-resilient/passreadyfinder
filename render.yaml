services:
  - type: web
    name: passreadyfinder
    runtime: node
    plan: starter
    buildCommand: npm install && npm install --prefix dashboard && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: WHATSAPP_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: TEST_EMAIL_ADDRESS
        sync: false
      - key: CONTROL_PANEL_SECRET
        sync: false

  # Phase 6 Background Prospector — daily at 09:00 UTC
  - type: cron
    name: passreadyfinder-auto-draft
    runtime: node
    plan: starter
    schedule: "0 9 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run auto-draft
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: WHATSAPP_NUMBER
        sync: false
