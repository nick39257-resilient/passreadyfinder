# Render Blueprint — https://render.com/docs/blueprint-spec
# Sync: Dashboard → Blueprints → Connect repo → Apply
services:
  - type: web
    name: passreadyfinder
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    buildCommand: npm install && npm install --prefix dashboard && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: GEMINI_DRAFT_MODEL
        value: gemini-3.1-flash-lite
      - key: WHATSAPP_NUMBER
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_HOST
        value: mail.privateemail.com
      - key: EMAIL_PORT
        value: "465"
      - key: TEST_EMAIL_ADDRESS
        sync: false
      - key: CONTROL_PANEL_SECRET
        sync: false

  # FindLeads — scrape & score once per day at 03:00 UTC (UK batched to stay under 512MB)
  - type: cron
    name: passreadyfinder-find
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "0 3 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run find-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: FIND_CRON_AUTHORITY_BATCH
        value: "20"
      - key: FIND_CRON_ENRICH_TOP_N
        value: "15"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN

  # QueueDrafter — 2 leads per run, every 30 min
  - type: cron
    name: passreadyfinder-queue-draft
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "*/30 * * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run queue-draft
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_API_KEY
      - key: OPENAI_BASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_BASE_URL
      - key: GEMINI_DRAFT_MODEL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: GEMINI_DRAFT_MODEL
      - key: WHATSAPP_NUMBER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: WHATSAPP_NUMBER

  # Sender — check hourly, send only during 2pm UK window
  - type: cron
    name: passreadyfinder-send
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "5,20,35,50 13,14 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run send-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: EMAIL_USER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_USER
      - key: EMAIL_PASS
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PASS
      - key: EMAIL_HOST
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_HOST
      - key: EMAIL_PORT
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PORT
      - key: TEST_EMAIL_ADDRESS
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TEST_EMAIL_ADDRESS

  # Texas autopilot — DuckDuckGo discovery, email scrape, contact forms (every 12h)
  - type: cron
    name: texas-autopilot-cron
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "0 */12 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && node scripts/ensure-playwright-chromium.mjs
    startCommand: node scripts/ensure-playwright-chromium.mjs && npm run texas-autopilot
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: EMAIL_USER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_USER
      - key: EMAIL_PASS
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PASS
      - key: EMAIL_HOST
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_HOST
      - key: EMAIL_PORT
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PORT
      - key: CONTROL_PANEL_SECRET
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: CONTROL_PANEL_SECRET
      - key: TEXAS_AUTOPILOT_LIMIT
        value: "8"
      - key: TEXAS_AUTOPILOT_DELAY_MS
        value: "1500"

  # UK autopilot — OSM/DDG discovery, email scrape (forms off on cron — saves RAM)
  - type: cron
    name: uk-autopilot-cron
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "30 */12 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && node scripts/ensure-playwright-chromium.mjs
    startCommand: node scripts/ensure-playwright-chromium.mjs && npm run uk-autopilot
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: EMAIL_USER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_USER
      - key: EMAIL_PASS
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PASS
      - key: EMAIL_HOST
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_HOST
      - key: EMAIL_PORT
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_PORT
      - key: CONTROL_PANEL_SECRET
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: CONTROL_PANEL_SECRET
      - key: UK_AUTOPILOT_LIMIT
        value: "8"
      - key: UK_AUTOPILOT_DELAY_MS
        value: "1500"
      - key: UK_AUTOPILOT_CONTACT_FORMS
        value: "false"
