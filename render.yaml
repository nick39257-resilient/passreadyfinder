services:
  - type: web
    name: passreadyfinder
    runtime: node
    plan: starter
    buildCommand: npm install && npm install --prefix dashboard && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: WHATSAPP_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: TEST_EMAIL_ADDRESS
        sync: false
      - key: CONTROL_PANEL_SECRET
        sync: false

  # Finder — scrape & score leads once per UTC day (hourly tick + daily slot gate)
  - type: cron
    name: passreadyfinder-find
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run find-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false

  # QueueDrafter — small staggered batches every 30 min (never blocks on full queue)
  - type: cron
    name: passreadyfinder-queue-draft
    runtime: node
    plan: starter
    schedule: "*/30 * * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run queue-draft
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: WHATSAPP_NUMBER
        sync: false
