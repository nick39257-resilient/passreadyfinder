# Render Blueprint — https://render.com/docs/blueprint-spec
# Sync: Dashboard → Blueprints → Connect repo → Apply
# Copilot mode (default): warm-only outreach, no cold email autosend.
# After push: apply blueprint in Render OR confirm web service env matches below.
# Remove obsolete SMTP vars if still present: EMAIL_PASS, EMAIL_HOST, EMAIL_PORT, MAIL_USERNAME
services:
  - type: web
    name: passreadyfinder
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    buildCommand: npm install && npm install --prefix dashboard && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: GEMINI_DRAFT_MODEL
        value: gemini-3.1-flash-lite
      - key: WHATSAPP_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: TEST_EMAIL_ADDRESS
        sync: false
      - key: CONTROL_PANEL_SECRET
        sync: false
      - key: OUTREACH_DAY_MODE
        value: "false"
      - key: OUTREACH_COPILOT_MODE
        value: "true"
      - key: OUTREACH_WARM_ONLY
        value: "true"
      - key: OUTREACH_EMAIL_AUTOSEND
        value: "false"
      - key: COPILOT_WHATSAPP_DAILY_CAP
        value: "20"
      - key: COPILOT_DIGEST_SIZE
        value: "10"
      - key: FLORIDA_DBPR_DATA_URL
        sync: false
      - key: OPEN_SEARCH_RADIUS_METRES
        value: "8000"
      - key: GOOGLE_PLACES_ENABLED
        value: "false"
      - key: PULSE_WEBHOOK_SECRET
        sync: false
      - key: TEXAS_MOBILE_AUTO_SEND
        value: "false"
      - key: OUTREACH_FIRST_TOUCH_LINK
        value: "false"
      - key: DAILY_SEND_CAP
        value: "50"
      - key: EMAIL_FROM_NAME
        value: "Nick - PassReady"
      - key: QUEUE_DRAFTER_BATCH_SIZE
        value: "8"
      - key: QUEUE_DRAFTER_RISK_THRESHOLD
        value: "30"

  # FindLeads — scrape & score once per day at 03:00 UTC (UK batched to stay under 512MB)
  - type: cron
    name: passreadyfinder-find
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "0 3 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run find-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: FIND_CRON_AUTHORITY_BATCH
        value: "20"
      - key: FIND_CRON_ENRICH_TOP_N
        value: "50"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN

  # QueueDrafter — warm/replied leads only in copilot mode (every 30 min)
  - type: cron
    name: passreadyfinder-queue-draft
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "*/30 * * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run queue-draft
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_API_KEY
      - key: OPENAI_BASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_BASE_URL
      - key: GEMINI_DRAFT_MODEL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: GEMINI_DRAFT_MODEL
      - key: WHATSAPP_NUMBER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: WHATSAPP_NUMBER
      - key: OUTREACH_DAY_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_DAY_MODE
      - key: OUTREACH_COPILOT_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_COPILOT_MODE
      - key: QUEUE_DRAFTER_BATCH_SIZE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: QUEUE_DRAFTER_BATCH_SIZE
      - key: QUEUE_DRAFTER_RISK_THRESHOLD
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: QUEUE_DRAFTER_RISK_THRESHOLD

  # Day pipeline — disabled in copilot (requires OUTREACH_DAY_MODE + email autosend)
  - type: cron
    name: passreadyfinder-day-pipeline
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "15 */2 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run day-pipeline-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_API_KEY
      - key: OPENAI_BASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OPENAI_BASE_URL
      - key: GEMINI_DRAFT_MODEL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: GEMINI_DRAFT_MODEL
      - key: WHATSAPP_NUMBER
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: WHATSAPP_NUMBER
      - key: RESEND_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: RESEND_API_KEY
      - key: EMAIL_FROM_NAME
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_FROM_NAME
      - key: OUTREACH_DAY_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_DAY_MODE
      - key: OUTREACH_COPILOT_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_COPILOT_MODE
      - key: OUTREACH_EMAIL_AUTOSEND
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_EMAIL_AUTOSEND
      - key: OUTREACH_WARM_ONLY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_WARM_ONLY
      - key: OUTREACH_FIRST_TOUCH_LINK
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_FIRST_TOUCH_LINK
      - key: DAILY_SEND_CAP
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: DAILY_SEND_CAP
      - key: QUEUE_DRAFTER_BATCH_SIZE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: QUEUE_DRAFTER_BATCH_SIZE
      - key: QUEUE_DRAFTER_RISK_THRESHOLD
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: QUEUE_DRAFTER_RISK_THRESHOLD

  # Sender — skips in copilot (OUTREACH_EMAIL_AUTOSEND=false); kept for warm follow-up if re-enabled
  - type: cron
    name: passreadyfinder-send
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "*/30 6-19 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install
    startCommand: npm run send-cron
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: RESEND_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: RESEND_API_KEY
      - key: TEST_EMAIL_ADDRESS
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TEST_EMAIL_ADDRESS
      - key: EMAIL_FROM_NAME
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: EMAIL_FROM_NAME
      - key: OUTREACH_DAY_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_DAY_MODE
      - key: OUTREACH_COPILOT_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_COPILOT_MODE
      - key: OUTREACH_EMAIL_AUTOSEND
        fromService:
          type: web
          name: passreadyfinder
