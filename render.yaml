  # Texas autopilot — discovery only in copilot (no mobile auto-email)
  - type: cron
    name: texas-autopilot-cron
    runtime: node
    plan: starter
    repo: https://github.com/nick39257-resilient/passreadyfinder
    branch: main
    schedule: "0 */4 * * *"
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && node scripts/ensure-playwright-chromium.mjs
    startCommand: node scripts/ensure-playwright-chromium.mjs && npm run texas-autopilot
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=448"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: TURSO_DATABASE_URL
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TURSO_AUTH_TOKEN
      - key: RESEND_API_KEY
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: RESEND_API_KEY
      - key: CONTROL_PANEL_SECRET
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: CONTROL_PANEL_SECRET
      - key: TEXAS_AUTOPILOT_LIMIT
        value: "25"
      - key: TEXAS_AUTOPILOT_DELAY_MS
        value: "1500"

      - key: OUTREACH_DAY_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_DAY_MODE
      - key: OUTREACH_COPILOT_MODE
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: OUTREACH_COPILOT_MODE
      - key: TEXAS_MOBILE_AUTO_SEND
        fromService:
          type: web
          name: passreadyfinder
          envVarKey: TEXAS_MOBILE_AUTO_SEND

