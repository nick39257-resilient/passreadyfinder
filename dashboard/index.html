<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PassReady — Command Center</title>
  </head>
  <body>
    <div id="root">
      <div
        id="boot-fallback"

          align-items: center;
          justify-content: center;
          padding: 1.5rem;
          background: #0a1628;
          color: #94a3b8;
          font-family: system-ui, sans-serif;

      >
        <p style="color: #34d399; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em">
